<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026 🏆</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060B18;--bg2:#0D1426;--bg3:#111B30;
  --border:rgba(201,162,39,.15);--border2:rgba(201,162,39,.4);
  --gold:#C9A227;--gold2:#7A6218;
  --text:#E8EDF5;--muted:#5B6B8A;
  --live:#00E676;--win:#4CAF50;--loss:#F44336;--draw:#FFC107;
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',sans-serif;
  --disp:'Bebas Neue',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
/* HEADER */
header{background:linear-gradient(180deg,#0A1020,var(--bg));border-bottom:1px solid var(--border2);padding:14px 16px 0;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
.logo{font-family:var(--disp);font-size:26px;letter-spacing:2px}
.logo span{color:var(--gold)}
.header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lang-btn{height:28px;min-width:42px;background:rgba(201,162,39,.08);border:1px solid var(--border2);border-radius:16px;color:var(--gold);font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.8px;cursor:pointer;transition:background .2s,border-color .2s}
.lang-btn:hover{background:rgba(201,162,39,.16);border-color:var(--gold)}
.live-badge{display:none;align-items:center;gap:6px;background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.3);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;color:var(--live);letter-spacing:1px;text-transform:uppercase}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--live);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{font-size:12px;font-weight:600;letter-spacing:.3px;color:var(--muted);padding:9px 13px;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:color .2s,border-color .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
/* CONTENT */
.content{max-width:820px;margin:0 auto;padding:18px 14px}
/* GENERIC */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-ttl{font-family:var(--disp);font-size:13px;letter-spacing:2px;color:var(--gold)}
.sec-cnt{font-size:12px;color:var(--muted)}
.divider{height:1px;background:var(--border);margin:18px 0}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text,.empty-text{font-size:13px;color:var(--muted);text-align:center;line-height:1.6}
.empty{text-align:center;padding:50px 20px}
.empty-icon{font-size:38px;margin-bottom:10px}
/* ROUND TABS */
.round-tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;margin-bottom:14px;scrollbar-width:none}
.round-tabs::-webkit-scrollbar{display:none}
.rtab{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;border:1px solid var(--border);color:var(--muted);transition:all .2s}
.rtab.active{background:rgba(201,162,39,.1);border-color:var(--border2);color:var(--gold)}
.rtab:hover{color:var(--text)}
/* DAY LABEL */
.day-lbl{font-family:var(--disp);font-size:13px;letter-spacing:2px;color:var(--muted);margin:18px 0 8px;display:flex;align-items:center;gap:8px}
.day-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.today-mark{color:var(--gold);font-size:10px}
/* MATCH CARD */
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:7px;cursor:pointer;transition:border-color .2s,background .2s}
.mc:hover{border-color:var(--border2);background:var(--bg3)}
.mc.live{border-color:rgba(0,230,118,.35);background:rgba(0,230,118,.02);animation:livePulse 3s ease-in-out infinite}
@keyframes livePulse{0%,100%{box-shadow:0 0 10px rgba(0,230,118,.04)}50%{box-shadow:0 0 22px rgba(0,230,118,.13)}}
.mc-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mc-round{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}
.mc-status{font-size:10px;font-weight:700;letter-spacing:.3px;padding:2px 7px;border-radius:10px}
.s-live{color:var(--live);background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3)}
.s-fin{color:var(--muted);background:rgba(91,107,138,.1)}
.s-up{color:var(--gold);background:rgba(201,162,39,.08);border:1px solid rgba(201,162,39,.2)}
.mc-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}
.t-side{display:flex;align-items:center;gap:8px}
.t-side.away{flex-direction:row-reverse;text-align:right}
.t-flag{width:32px;height:22px;object-fit:cover;border-radius:3px;flex-shrink:0}
.t-name{font-family:var(--disp);font-size:15px;letter-spacing:.4px;line-height:1.1}
.score-c{text-align:center;min-width:72px}
.score{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--text);letter-spacing:2px}
.score.live{color:var(--live)}
.vs{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:2px}
.mc-minute{font-family:var(--mono);font-size:10px;color:var(--live);font-weight:600;margin-top:2px}
/* TIME BLOCK – SIGNATURE ELEMENT */
.mc-time{display:flex;align-items:center;justify-content:space-between;margin-top:9px;padding-top:9px;border-top:1px solid var(--border)}
.es-time{display:flex;align-items:baseline;gap:5px}
.es-val{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--gold)}
.es-lbl{font-size:9px;font-weight:600;letter-spacing:1px;color:var(--gold2);text-transform:uppercase}
.utc-val{font-family:var(--mono);font-size:10px;color:var(--muted)}
.mc-venue{font-size:10px;color:var(--muted);text-align:right;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* GROUPS TABLE */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.gc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.gc-hdr{background:rgba(201,162,39,.07);border-bottom:1px solid var(--border);padding:9px 13px;display:flex;align-items:center;justify-content:space-between}
.gc-name{font-family:var(--disp);font-size:15px;letter-spacing:2px;color:var(--gold)}
.gtbl{width:100%;border-collapse:collapse}
.gtbl th{font-size:9px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);padding:7px 13px;text-align:center}
.gtbl th:first-child{text-align:left}
.gtbl td{font-size:12px;padding:7px 13px;text-align:center;border-top:1px solid var(--border)}
.gtbl td:first-child{text-align:left}
.gtbl tr.q1 td,.gtbl tr.q2 td{background:rgba(76,175,80,.04)}
.gtbl tr.q3 td{background:rgba(255,193,7,.03)}
.tcell{display:flex;align-items:center;gap:7px}
.tflag-sm{width:20px;height:13px;object-fit:cover;border-radius:2px}
.ptscell{font-family:var(--mono);font-weight:700}
.qdot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:3px}
.qdot.g{background:var(--win)}.qdot.y{background:var(--draw)}
/* MEJOR TERCERO */
.tercero-table{width:100%;border-collapse:collapse;margin-top:8px}
.tercero-table th{font-size:10px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);padding:7px 10px;text-align:center;border-bottom:1px solid var(--border)}
.tercero-table th:first-child,.tercero-table th:nth-child(2){text-align:left}
.tercero-table td{font-size:12px;padding:7px 10px;text-align:center;border-top:1px solid var(--border)}
.tercero-table td:first-child,.tercero-table td:nth-child(2){text-align:left}
.tercero-table tr.q-in td{background:rgba(201,162,39,.06)}
.rank-num{font-family:var(--mono);font-weight:700;font-size:13px;color:var(--gold);min-width:20px}
/* QUINIELA */
.q-subtabs{display:flex;gap:8px;margin-bottom:16px}
.q-stab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--muted);transition:all .2s}
.q-stab.active{background:rgba(201,162,39,.1);border-color:var(--border2);color:var(--gold)}
.q-stab:hover{color:var(--text)}
/* Quiniela group card */
.qg-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.qg-hdr{background:rgba(201,162,39,.06);border-bottom:1px solid var(--border);padding:8px 13px;font-family:var(--disp);font-size:14px;letter-spacing:2px;color:var(--gold);display:flex;align-items:center;justify-content:space-between}
.qg-team{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-top:1px solid var(--border)}
.qg-team:first-of-type{border-top:none}
.qg-rank{font-family:var(--mono);font-size:12px;font-weight:700;width:22px;text-align:center;padding:3px 4px;border-radius:4px;flex-shrink:0}
.rank-1{color:#FFD700;background:rgba(255,215,0,.1)}
.rank-2{color:#C0C0C0;background:rgba(192,192,192,.1)}
.rank-3{color:var(--draw);background:rgba(255,193,7,.07)}
.rank-4{color:var(--muted);background:rgba(91,107,138,.07)}
.qg-tname{display:flex;align-items:center;gap:7px;font-size:14px;font-family:var(--disp);letter-spacing:.4px;flex:1;margin-left:8px}
.qg-arrows{display:flex;gap:4px}
.arr-btn{background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer;font-size:11px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.arr-btn:hover{color:var(--text);border-color:var(--border2)}
.arr-btn:disabled{opacity:.25;cursor:not-allowed}
/* Mejor Tercero quiniela */
.mt-team{display:flex;align-items:center;gap:10px;padding:9px 13px;border-top:1px solid var(--border);background:var(--bg2);border-radius:0}
.mt-chk{width:18px;height:18px;accent-color:var(--gold);cursor:pointer;flex-shrink:0}
.mt-pos{font-family:var(--mono);font-size:11px;color:var(--muted);width:30px}
.mt-flag{font-size:18px}
.mt-name{font-family:var(--disp);font-size:14px;letter-spacing:.4px;flex:1}
.mt-pts{font-family:var(--mono);font-size:11px;color:var(--muted)}
.mt-qualify{color:var(--win);font-size:10px;font-weight:700;letter-spacing:.5px}
/* Bracket */
.bracket-round{margin-bottom:20px}
.bracket-round-title{font-family:var(--disp);font-size:15px;letter-spacing:2px;color:var(--gold);margin-bottom:10px}
.b-match{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:7px;overflow:hidden}
.b-match-label{font-size:9px;font-weight:600;letter-spacing:.8px;color:var(--muted);padding:4px 10px;background:rgba(201,162,39,.04);border-bottom:1px solid var(--border);text-transform:uppercase}
.b-team{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;transition:background .2s}
.b-team:hover:not(.tbd){background:rgba(201,162,39,.05)}
.b-team:first-of-type.b-team+.b-team{border-top:1px solid var(--border)}
.b-team+.b-team{border-top:1px solid var(--border)}
.b-team.winner{background:rgba(201,162,39,.08)}
.b-team.winner .b-tname{color:var(--gold)}
.b-team.tbd .b-tname{color:var(--muted);font-style:italic}
.b-tname{font-family:var(--disp);font-size:13px;letter-spacing:.4px;flex:1}
.b-check{color:var(--gold);font-size:12px;opacity:0}
.b-team.winner .b-check{opacity:1}
/* GOLEADORES */
.stats-intro{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.stat-pills{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.stat-pills::-webkit-scrollbar{display:none}
.stat-pill{border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:11px;font-weight:700;letter-spacing:.3px;color:var(--muted);background:var(--bg2);white-space:nowrap}
.stat-pill.ready{border-color:var(--border2);color:var(--gold);background:rgba(201,162,39,.08)}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px}
.stat-card-hdr{background:rgba(201,162,39,.06);border-bottom:1px solid var(--border);padding:9px 14px;font-family:var(--disp);font-size:14px;letter-spacing:2px;color:var(--gold)}
.stat-empty-row{padding:18px 14px;text-align:center;color:var(--muted);font-size:12px;line-height:1.5}
.stat-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-top:1px solid var(--border)}
.stat-row:first-of-type{border-top:none}
.stat-pos{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--gold);width:22px;text-align:center;flex-shrink:0}
.stat-flag{font-size:16px;flex-shrink:0}
.stat-info{flex:1}
.stat-pname{font-size:13px;font-weight:600}
.stat-team{font-size:11px;color:var(--muted)}
.stat-val{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--text)}
/* DETAIL PANEL */
.detail-panel{display:none;position:fixed;inset:0;z-index:200;background:rgba(6,11,24,.93);backdrop-filter:blur(4px);overflow-y:auto;padding:20px 14px;align-items:flex-start;justify-content:center}
.detail-panel.open{display:flex}
.detail-inner{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:560px;overflow:hidden}
.d-close{position:fixed;top:22px;right:18px;background:var(--bg2);border:1px solid var(--border);border-radius:50%;width:30px;height:30px;display:none;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:15px;z-index:201}
/* INPUT/BUTTON */
.search-bar{display:flex;gap:8px;margin-bottom:18px}
.sinput{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none}
.sinput:focus{border-color:var(--border2)}
.sinput::placeholder{color:var(--muted)}
.btn{background:rgba(201,162,39,.1);border:1px solid var(--border2);border-radius:8px;padding:10px 16px;color:var(--gold);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:background .2s;white-space:nowrap}
.btn:hover{background:rgba(201,162,39,.2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:6px 12px;font-size:12px}
/* REFRESH BAR */
.ref-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 0;margin-bottom:14px}
.ref-txt{font-size:11px;color:var(--muted)}
.ref-btn{font-size:11px;font-weight:600;color:var(--gold);background:none;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:.5px}
/* STAT BAR */
.sbar-row{margin-bottom:10px}
.sbar-lbls{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.sbar-lbl-mid{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.4px}
.sbar-track{height:3px;background:var(--bg3);border-radius:2px;display:flex;overflow:hidden}
.sbar-h{background:var(--gold);border-radius:2px;transition:width .5s}
.sbar-a{background:var(--muted);border-radius:2px;margin-left:auto;transition:width .5s}
/* INFO BOX */
.info-box{background:rgba(201,162,39,.05);border:1px solid rgba(201,162,39,.2);border-radius:8px;padding:10px 13px;font-size:12px;color:var(--gold2);margin-bottom:14px;line-height:1.6}
/* PLAYERS */
.players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.squad-blocks{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-top:12px}
.squad-block{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.squad-block.full{grid-column:1/-1}
.squad-hdr{background:rgba(201,162,39,.06);border-bottom:1px solid var(--border);padding:9px 13px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.squad-title{font-family:var(--disp);font-size:14px;letter-spacing:2px;color:var(--gold)}
.squad-count{font-family:var(--mono);font-size:11px;color:var(--muted)}
.squad-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:8px;padding:10px}
.manager-card{display:flex;align-items:center;gap:10px;padding:12px 13px}
.manager-avatar{width:36px;height:36px;border-radius:50%;background:rgba(201,162,39,.1);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.pc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px}
.pc:hover{border-color:var(--border2)}
.pc-pos{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--gold);text-transform:uppercase;margin-bottom:3px}
.pc-name{font-size:12px;font-weight:600;line-height:1.3}
.pc-num{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
/* TIMELINE */
.tl-ev{display:flex;align-items:flex-start;gap:10px;padding:7px 0}
.tl-min{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--gold);min-width:28px;text-align:right}
.tl-txt{font-size:12px;color:var(--text)}
.tl-team{font-size:10px;color:var(--muted)}
/* Highlight */
.hl-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;margin-bottom:7px}
.hl-card:hover{border-color:var(--gold2)}
.hl-play{width:72px;height:46px;background:var(--bg3);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hl-title{font-size:12px;font-weight:500;line-height:1.4}
/* Responsive */
@media(max-width:480px){
  .header-top{align-items:flex-start}
  .header-actions{align-items:flex-end;flex-direction:column}
  .t-name{font-size:13px}.score{font-size:19px}
  .groups-grid{grid-template-columns:1fr}
  .players-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  .squad-blocks{grid-template-columns:1fr}
}

/* QUINIELA SCORE INPUTS */
.qmatch{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:8px 12px;border-top:1px solid var(--border)}
.qmatch:first-of-type{border-top:none}
.qmt{font-family:var(--disp);font-size:13px;letter-spacing:.3px;display:flex;align-items:center;gap:5px}
.qmt.right{flex-direction:row-reverse;text-align:right}
.qsc{display:flex;align-items:center;gap:5px;justify-content:center}
.qsi{width:38px;height:34px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--gold);font-family:var(--mono);font-size:16px;font-weight:700;text-align:center;outline:none;-moz-appearance:textfield}
.qsi::-webkit-outer-spin-button,.qsi::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.qsi:focus{border-color:var(--gold);background:rgba(201,162,39,.06)}
.qsi:disabled{opacity:.3;cursor:not-allowed}
.qsep{font-family:var(--mono);font-weight:700;color:var(--muted)}
.qstand{border-top:1px solid var(--border)}
/* BRACKET SCORES */
.b-scores{display:flex;align-items:center;gap:5px;justify-content:center;padding:6px 10px;border-top:1px solid var(--border);background:rgba(201,162,39,.03)}
.pen-row{display:none;align-items:center;gap:8px;padding:6px 10px;border-top:1px solid var(--border);background:rgba(255,193,7,.04);flex-wrap:wrap}
.pen-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;font-size:11px;font-weight:600;padding:4px 10px;transition:all .2s}
.pen-btn.active{background:rgba(201,162,39,.15);border-color:var(--gold);color:var(--gold)}
.pen-btn:hover{color:var(--text);border-color:var(--border2)}
/* CONFEDERATIONS */
.conf-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px}
.conf-hdr{background:rgba(201,162,39,.07);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:8px}
.conf-name{font-family:var(--disp);font-size:15px;letter-spacing:2px;color:var(--gold)}
.conf-label{font-size:11px;color:var(--muted)}
.conf-teams{display:flex;flex-wrap:wrap;gap:0}
.conf-team{display:flex;align-items:center;gap:7px;padding:9px 13px;cursor:pointer;transition:background .2s;border-top:1px solid var(--border);width:50%}
.conf-team:nth-child(2n+1){border-right:1px solid var(--border)}
.conf-team:nth-child(1),.conf-team:nth-child(2){border-top:none}
.conf-team:hover{background:rgba(201,162,39,.06)}
.conf-tname{font-family:var(--disp);font-size:13px;letter-spacing:.3px}
/* QUINIELA CHAMPION */
.q-champ{text-align:center;padding:20px;background:rgba(201,162,39,.06);border:1px solid var(--border2);border-radius:12px;margin-top:14px}

/* CALENDAR SPLIT VIEW (matches + standings) */
.cal-split{display:grid;grid-template-columns:1fr 280px;gap:20px;align-items:start}
.cal-stand-sticky{position:sticky;top:108px;margin-top:2px}
.cal-standings-col{padding-top:2px}
@media(max-width:660px){
  .cal-split{grid-template-columns:1fr}
  .cal-stand-sticky{position:static;margin-bottom:14px}
  .cal-standings-col{order:-1;padding-top:0}
}
.gc-compact th{font-size:10px;padding:7px 11px;letter-spacing:.4px}
.gc-compact td{font-size:12px;padding:7px 11px}
.gc-compact .tcell span:last-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
</style>
</head>

function showLocalModeNotice(msg){
  const rt=document.getElementById('refTxt');
  if(rt)rt.textContent='Modo local activo';
  const live=document.getElementById('liveContent');
  if(live&&live.querySelector('.loading')){
    live.innerHTML='<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">Modo local activo.<br>Si la API externa no responde, la web usa el calendario guardado.</div></div>';
  }
  if(msg)console.warn(msg);
}
window.addEventListener('error',e=>showLocalModeNotice(e.message));
window.addEventListener('unhandledrejection',e=>showLocalModeNotice(e.reason&&e.reason.message?e.reason.message:String(e.reason||'')));

const API_TIMEOUT=3500;
async function fetchJson(url,opts={},timeoutMs=API_TIMEOUT){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),timeoutMs);
  try{
    const r=await fetch(url,Object.assign({},opts,{signal:ctrl.signal}));
    if(!r.ok)throw new Error(r.status);
    return r.json();
  }finally{clearTimeout(timer);}
}
const v1=(p,timeoutMs)=>fetchJson(B1+p,{},timeoutMs);
const v2=(p,timeoutMs)=>fetchJson(B2+p,{headers:{'X-API-KEY':API_KEY}},timeoutMs);

const FIXTURES=FX.map(f=>({
  id:f[0],date:f[1],time:f[2],home:f[3],away:f[4],
  group:f[5],venue:f[6],city:f[7],

// ══════════════════════════════════════════════
// TIME UTILITIES
// ══════════════════════════════════════════════
function toES(dateStr,timeStr){
  if(!timeStr||!dateStr)return null;
  try{
    const dt=new Date(`${dateStr}T${timeStr.replace(/\+.*/,'')}:00Z`);
    if(isNaN(dt))return null;
    return{
      time:dt.toLocaleString('es-ES',{timeZone:TZ,hour:'2-digit',minute:'2-digit',hour12:false}),
      date:dt.toLocaleString('es-ES',{timeZone:TZ,weekday:'short',day:'numeric',month:'short'}),
      dt
    };
  }catch{return null;}
}
function fmtDay(dateStr){
  const[y,m,d]=dateStr.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
}
function isToday(d){return d===new Date().toISOString().slice(0,10)}
function isPast(dateStr,timeStr){
  const es=toES(dateStr,timeStr);
  return es&&es.dt<new Date();
}
const LIVE_ST=['1H','2H','HT','ET','PEN','In Progress','Live','Progress'];
const FIN_ST=['Match Finished','FT','AET','AOT','PEN'];
const isLive=s=>s&&LIVE_ST.some(x=>s.toLowerCase().includes(x.toLowerCase()));
const isFin=s=>s&&FIN_ST.some(x=>s.toLowerCase().includes(x.toLowerCase()));

// MATCH CARD
// ══════════════════════════════════════════════
function matchCard(m,overrides={}){
  const om=Object.assign({},m,overrides);
  const es=toES(om.date,om.time);
  const live=isLive(om.status);
  const fin=isFin(om.status);
  const hasScore=om.homeScore!==null&&om.homeScore!==undefined&&om.homeScore!=='';
  const hBadge=om.strHomeTeamBadge?`<img class="t-flag" src="${om.strHomeTeamBadge}/tiny" onerror="this.style.display='none'" alt="">`:
    (om.homeFlag?`<span style="font-size:20px;flex-shrink:0">${om.homeFlag}</span>`:`<span style="font-size:20px;flex-shrink:0">🏳️</span>`);
  const aBadge=om.strAwayTeamBadge?`<img class="t-flag" src="${om.strAwayTeamBadge}/tiny" onerror="this.style.display='none'" alt="">`:
    (om.awayFlag?`<span style="font-size:20px;flex-shrink:0">${om.awayFlag}</span>`:`<span style="font-size:20px;flex-shrink:0">🏳️</span>`);
  const statusHtml=live?`<span class="mc-status s-live">${om.progress||t('liveStatus')}</span>`:
    fin?`<span class="mc-status s-fin">${t('finishedShort')}</span>`:
    `<span class="mc-status s-up">${t('upcoming')}</span>`;
  const rndLbl=(om.group||'').startsWith('Group')?`${t('group')} ${(om.group||'').slice(-1)}`:(om.group||'');
  const scoreHtml=(live||fin)&&hasScore?
    `<div class="score${live?' live':''}">${om.homeScore}&nbsp;–&nbsp;${om.awayScore}</div>${live&&om.progress?`<div class="mc-minute">${om.progress}'</div>`:''}`
    :`<div class="vs">VS</div>`;
  const timeBlock=es?`<div class="mc-time">
    <div class="es-time"><span class="es-val">${es.time}</span><span class="es-lbl">🇪🇸 ${t('spainTime')}</span></div>
    <div style="text-align:right"><div class="utc-val">${om.time} UTC</div><div class="mc-venue">${om.venue||''}${om.city?', '+om.city:''}</div></div>
  </div>`:`<div class="mc-time" style="justify-content:flex-end"><div class="mc-venue">${om.venue||''}${om.city?', '+om.city:''}</div></div>`;
  return`<div class="mc${live?' live':''}" onclick="openDetail(${om.id||0},'${om.date}','${om.home}','${om.away}')">
    <div class="mc-meta"><span class="mc-round">${rndLbl}</span>${statusHtml}</div>
    <div class="mc-body">
      <div class="t-side">${hBadge}<span class="t-name">${om.home||'Por definir'}</span></div>
      <div class="score-c">${scoreHtml}</div>
      <div class="t-side away"><span class="t-name">${om.away||'Por definir'}</span>${aBadge}</div>
    </div>${timeBlock}</div>`;
}

function liveFallbackHtml(today,todayFx){

    return `<div class="sec-hdr"><span class="sec-ttl">📅 ${t('todayMatches')}</span></div>`+
      todayFx.map(f=>matchCard(f)).join('');

  if(next.length){
    return `<div class="sec-hdr"><span class="sec-ttl">⏭ ${t('nextMatches')}</span></div>`+
      next.map(f=>matchCard(f)).join('');
  }

}
async function loadLive(){
  clearInterval(liveTimer);
  const el=document.getElementById('liveContent');
  const rt=document.getElementById('refTxt');
  const today=new Date().toISOString().slice(0,10);
  const todayFx=FIXTURES.filter(f=>f.date===today);
  el.innerHTML=liveFallbackHtml(today,todayFx);
  rt.textContent=t('loadingShort');
  let liveNow=[],upcoming=[],finished=[];
  // Try V2 livescore
  try{
    const d=await v2(`/livescore/${LEAGUE_ID}`);
    liveNow=d.events||[];
  }catch{}
  // Fill from schedule
  const apiById={};
  liveNow.forEach(e=>{if(e.idEvent)apiById[e.idEvent]=e});
  // Also try eventsday for today
  try{
    const d=await v1(`/eventsday.php?d=${today}&l=${LEAGUE_ID}`);
    (d.events||[]).forEach(e=>{
      if(isLive(e.strStatus)&&!apiById[e.idEvent])liveNow.push(e);
      else if(isFin(e.strStatus))finished.push(e);
      else upcoming.push(e);
    });
  }catch{}
  // Merge with local fixtures for time/venue
  const matchFx=m=>{
    const h=(m.strHomeTeam||'').trim(),a=(m.strAwayTeam||'').trim();
    return FIXTURES.find(f=>(f.home===h||f.away===h)&&(f.home===a||f.away===a));
  };
  let html='';
  if(liveNow.length>0){
    document.getElementById('liveBadge').style.display='flex';
    html+=`<div class="sec-hdr"><span class="sec-ttl">🔴 ${t('liveNow')}</span><span class="sec-cnt">${liveNow.length}</span></div>`;
    html+=liveNow.map(e=>{
      const fx=matchFx(e)||{};
      return matchCard({
        id:e.idEvent,date:e.dateEvent||today,time:fx.time||e.strTime?.slice(0,5)||'',
        home:e.strHomeTeam,away:e.strAwayTeam,group:e.strRound,
        venue:fx.venue||e.strVenue||'',city:fx.city||'',
        homeFlag:FLAGS[e.strHomeTeam]||'🏳️',awayFlag:FLAGS[e.strAwayTeam]||'🏳️',
        strHomeTeamBadge:e.strHomeTeamBadge,strAwayTeamBadge:e.strAwayTeamBadge,
        status:e.strStatus,homeScore:e.intHomeScore,awayScore:e.intAwayScore,progress:e.strProgress
      });
    }).join('');
    html+='<div class="divider"></div>';
  }else{document.getElementById('liveBadge').style.display='none';}
  if(upcoming.length>0){
    html+=`<div class="sec-hdr"><span class="sec-ttl">📅 ${t('todayUpcoming')}</span><span class="sec-cnt">${upcoming.length}</span></div>`;
    html+=upcoming.map(e=>{
      const fx=matchFx(e)||FIXTURES.find(f=>f.date===today)||{};
      return matchCard({
        id:e.idEvent,date:e.dateEvent||today,time:fx.time||e.strTime?.slice(0,5)||'',
        home:e.strHomeTeam,away:e.strAwayTeam,group:e.strRound,
        venue:fx.venue||e.strVenue||'',city:fx.city||'',
        homeFlag:FLAGS[e.strHomeTeam]||'🏳️',awayFlag:FLAGS[e.strAwayTeam]||'🏳️',
        strHomeTeamBadge:e.strHomeTeamBadge,strAwayTeamBadge:e.strAwayTeamBadge,
        status:e.strStatus
      });
    }).join('');
    html+='<div class="divider"></div>';
  }
  if(finished.length>0){
    html+=`<div class="sec-hdr"><span class="sec-ttl">✅ ${t('finished')}</span></div>`;
    html+=finished.map(e=>{
      const fx=matchFx(e)||{};
      return matchCard({
        id:e.idEvent,date:e.dateEvent||today,time:fx.time||e.strTime?.slice(0,5)||'',
        home:e.strHomeTeam,away:e.strAwayTeam,group:e.strRound,
        venue:fx.venue||e.strVenue||'',city:fx.city||'',
        homeFlag:FLAGS[e.strHomeTeam]||'🏳️',awayFlag:FLAGS[e.strAwayTeam]||'🏳️',
        strHomeTeamBadge:e.strHomeTeamBadge,strAwayTeamBadge:e.strAwayTeamBadge,
        status:e.strStatus,homeScore:e.intHomeScore,awayScore:e.intAwayScore
      });
    }).join('');
  }
  if(!html){
    html=liveFallbackHtml(today,todayFx);
  }
  el.innerHTML=html;
  liveCountdown=60;
  rt.textContent=t('updatedNext',{s:liveCountdown});
  liveTimer=setInterval(()=>{
    liveCountdown--;
    if(liveCountdown<=0)loadLive();
    else rt.textContent=t('updatedNext',{s:liveCountdown});
  },1000);
}

// Compute real standings for a group letter ('A'..'L') using apiResults
function computeRealGroupStandings(g){
  const st={};
  GROUPS[g].forEach(t=>{st[t]={name:t,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});
  FIXTURES.filter(f=>f.group==='Group '+g).forEach(m=>{
    const r=apiResults[m.home+'|'+m.away]||{};
    if(!isFin(r.status)||r.homeScore===null||r.homeScore===undefined)return;
    const h=parseInt(r.homeScore)||0,a=parseInt(r.awayScore)||0;
    st[m.home].p++;st[m.home].gf+=h;st[m.home].ga+=a;
    st[m.away].p++;st[m.away].gf+=a;st[m.away].ga+=h;
    if(h>a){st[m.home].w++;st[m.home].pts+=3;st[m.away].l++;}
    else if(h===a){st[m.home].d++;st[m.home].pts++;st[m.away].d++;st[m.away].pts++;}
    else{st[m.away].w++;st[m.away].pts+=3;st[m.home].l++;}
  });
  return Object.values(st).sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf);
}

  return h;
}

function buildMatchesHtml(fx){

async function loadGrupos(){
  const el=document.getElementById('standingsContent');
  // Step 1: Build standings from FIXTURES (always works, shows all 12 groups)
  computeStandingsFromFixtures();
  // Step 2: Try to enrich with live API results (scores overlay)
  try{
    // Load today's finished matches to get live scores
    const today=new Date().toISOString().slice(0,10);
    const d=await v1(`/eventsday.php?d=${today}&l=${LEAGUE_ID}`);
    (d.events||[]).forEach(e=>{
      if(isFin(e.strStatus)||isLive(e.strStatus)){
        const key=`${e.strHomeTeam}|${e.strAwayTeam}`;
        apiResults[key]={status:e.strStatus,homeScore:e.intHomeScore,awayScore:e.intAwayScore,id:e.idEvent};
      }
    });
    // Also try the full season results for all past days
    const d2=await v1(`/eventsseason.php?id=${LEAGUE_ID}&s=2026`);
    (d2.events||[]).forEach(e=>{
      if(isFin(e.strStatus)){
        const key=`${e.strHomeTeam}|${e.strAwayTeam}`;
        apiResults[key]={status:e.strStatus,homeScore:e.intHomeScore,awayScore:e.intAwayScore,id:e.idEvent};
      }
    });
    // Try API table — only trust it if it has proper group assignments (A-L)
    const d3=await v1(`/lookuptable.php?l=${LEAGUE_ID}&s=2026`);
    const tbl=d3.table||[];
    if(tbl.length>0){
      const tmp={};
      tbl.forEach(r=>{const g=r.strGroup||'';if(g&&g!=='?')({tmp}[g]=(tmp[g]||[]).push(r));});
      const hasProperGroups=Object.keys(tmp).length>=2;
      if(hasProperGroups){
        standingsData=tmp;
        el.innerHTML=renderStandingsHTML(standingsData);
        return;
      }
    }
    // Recompute with newly loaded apiResults
    computeStandingsFromFixtures();
  }catch(e){
    // Already showing fixture-based standings from Step 1 — no action needed
    console.warn('Groups API load error:',e);
  }
}
function computeStandingsFromFixtures(){
  const teams={};
  // Initialize ALL 48 teams from FIXTURES regardless of results
  FIXTURES.filter(f=>f.group.startsWith('Group')).forEach(f=>{
    [f.home,f.away].forEach(t=>{
      const key=`${f.group}|${t}`;
      if(!teams[key])teams[key]={name:t,flag:FLAGS[t]||'🏳️',group:f.group,p:0,w:0,d:0,l:0,gf:0,ga:0};
    });
    // Overlay scores from apiResults if match is finished
    const k1=`${f.home}|${f.away}`;
    // TheSportsDB sometimes uses different team names — try both directions
    const r=apiResults[k1]||apiResults[`${f.away}|${f.home}`]||{};
    if(isFin(r.status)&&r.homeScore!==null&&r.homeScore!==undefined){
      const isSwapped=!!apiResults[`${f.away}|${f.home}`]&&!apiResults[k1];
      const h=parseInt(isSwapped?r.awayScore:r.homeScore)||0;
      const a=parseInt(isSwapped?r.homeScore:r.awayScore)||0;
      const hk=`${f.group}|${f.home}`;const ak=`${f.group}|${f.away}`;
      teams[hk].p++;teams[hk].gf+=h;teams[hk].ga+=a;
      teams[ak].p++;teams[ak].gf+=a;teams[ak].ga+=h;
      if(h>a){teams[hk].w++;teams[ak].l++;}
      else if(h===a){teams[hk].d++;teams[ak].d++;}
      else{teams[ak].w++;teams[hk].l++;}
    }
  });
  standingsData={};
  Object.values(teams).forEach(t=>{
    if(!standingsData[t.group])standingsData[t.group]=[];
    t.pts=t.w*3+t.d;t.gd=t.gf-t.ga;
    t.intPoints=t.pts;t.intPlayed=t.p;t.intWin=t.w;t.intDraw=t.d;t.intLoss=t.l;
    t.intGoalsFor=t.gf;t.intGoalsAgainst=t.ga;t.strBadge=null;t.strGroup=t.group;
    standingsData[t.group].push(t);
  });
  Object.keys(standingsData).forEach(g=>{
    standingsData[g].sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  });
  const el=document.getElementById('standingsContent');
  if(el)el.innerHTML=renderStandingsHTML(standingsData);
}
function renderStandingsHTML(data){
  // Filter out invalid groups (like '?' or empty) — only keep proper group keys
  const validKeys=Object.keys(data).filter(g=>g&&g!=='?'&&g!=='undefined');
  if(!validKeys.length)return`<div class="empty"><div class="empty-icon">⏳</div><div class="empty-text">Cargando clasificación...</div></div>`;

  // Sort: 'Group A'→'Group L' or single letter 'A'→'L'
  validKeys.sort((a,b)=>a.slice(-1).localeCompare(b.slice(-1))).forEach(g=>{
    const rows=[...data[g]].sort((a,b)=>{
      const pts=(x)=>parseInt(x.intPoints||x.pts||0);
      const gd=(x)=>parseInt(x.intGoalsFor||x.gf||0)-parseInt(x.intGoalsAgainst||x.ga||0);
      const gf=(x)=>parseInt(x.intGoalsFor||x.gf||0);
      return pts(b)-pts(a)||gd(b)-gd(a)||gf(b)-gf(a);
    });
    // Get display name: 'Group A' → 'GRUPO A', 'A' → 'GRUPO A', '?' → skip
    const letter=g.length===1?g:g.slice(-1);
    const dn=`GRUPO ${letter}`;
    html+=`<div class="gc"><div class="gc-hdr"><span class="gc-name">${dn}</span></div>
    <table class="gtbl"><thead><tr><th>Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>GD</th><th>Pts</th></tr></thead><tbody>`;
    rows.forEach((r,i)=>{

      const teamName=r.name||r.strTeam||'';

        `<span style="font-size:13px">${FLAGS[teamName]||'🏳️'}</span>`;
      const gd=(parseInt(r.intGoalsFor||r.gf||0))-(parseInt(r.intGoalsAgainst||r.ga||0));
      const gdStr=gd>0?`+${gd}`:String(gd);
      html+=`<tr class="${cls}"><td><div class="tcell">${dot}${badge}<span>${teamName}</span></div></td>
      <td>${r.intPlayed||r.p||0}</td><td>${r.intWin||r.w||0}</td><td>${r.intDraw||r.d||0}</td><td>${r.intLoss||r.l||0}</td>
      <td>${gdStr}</td><td class="ptscell">${r.intPoints||r.pts||0}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  html+=`</div><div style="margin-top:12px;font-size:11px;color:var(--muted);text-align:center">

  </div>`;
  return html;
}

function getGScore(fxId){const q=getQ();return(q.gscores&&q.gscores[fxId])||{h:'',a:''};}
function qSI(fxId,side,val){
  const q=getQ();if(!q.gscores)q.gscores={};

function getKScore(rid,slot){const q=getQ();return(q.kscores&&q.kscores[rid+'_'+slot])||{h:'',a:'',pen:null};}
function saveKScore(rid,slot,patch){
  const q=getQ();if(!q.kscores)q.kscores={};

  saveQ({kscores:q.kscores});
}

}
function qSetPen(rid,slot,team){

}

// ── STANDINGS CALCULATION ───────────────────────
function computeQStandings(g){
  const st={};GROUPS[g].forEach(t=>{st[t]={name:t,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});
  FIXTURES.filter(f=>f.group==='Group '+g).forEach(m=>{
    const s=getGScore(m.id);if(s.h===''||s.a==='')return;
    const h=parseInt(s.h)||0,a=parseInt(s.a)||0;
    st[m.home].p++;st[m.home].gf+=h;st[m.home].ga+=a;
    st[m.away].p++;st[m.away].gf+=a;st[m.away].ga+=h;
    if(h>a){st[m.home].w++;st[m.home].pts+=3;st[m.away].l++;}
    else if(h===a){st[m.home].d++;st[m.home].pts++;st[m.away].d++;st[m.away].pts++;}
    else{st[m.away].w++;st[m.away].pts+=3;st[m.home].l++;}
  });
  return Object.values(st).sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf);
}
function renderQStand(g){
  const st=computeQStandings(g);
  let h='<table class="gtbl"><thead><tr><th>Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>DG</th><th>Pts</th></tr></thead><tbody>';
  st.forEach((t,i)=>{
    const cls=i<2?'q'+(i+1):'';const dot=i<2?'<span class="qdot g"></span>':i===2?'<span class="qdot y"></span>':'';
    h+='<tr class="'+cls+'"><td><div class="tcell">'+dot+'<span style="font-size:12px">'+(FLAGS[t.name]||'🏳️')+'</span><span>'+t.name+'</span></div></td>'+
       '<td>'+t.p+'</td><td>'+t.w+'</td><td>'+t.d+'</td><td>'+t.l+'</td>'+
       '<td>'+(t.gf-t.ga>0?'+':'')+(t.gf-t.ga)+'</td><td class="ptscell">'+t.pts+'</td></tr>';
  });
  return h+'</tbody></table>';
}

// ── MEJOR TERCERO ───────────────────────────────
function computeQTerceros(){
  const list=[];
  Object.keys(GROUPS).sort().forEach(g=>{
    const st=computeQStandings(g);
    if(st[2])list.push({name:st[2].name,group:g,pts:st[2].pts,gd:st[2].gf-st[2].ga,gf:st[2].gf});
  });
  return list.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
}

// ── BRACKET RESOLUTION ──────────────────────────
function getMatchDef(rid,slot){
  const rd=BRACKET.find(r=>r.id===rid);return rd&&rd.matches.find(m=>m.slot===slot)||null;
}
function qResolveTeam(src){
  if(!src)return null;
  if(src.match(/^[12][A-L]$/))return computeQStandings(src[1])[parseInt(src[0])-1]?.name||null;
  if(src.match(/^T\d+$/))return computeQTerceros()[parseInt(src.slice(1))-1]?.name||null;
  if(src.endsWith('_loser')){
    const base=src.replace('_loser','');const lu=base.lastIndexOf('_');
    const rid=base.slice(0,lu);const slot=parseInt(base.slice(lu+1));
    const w=getKnockoutWinner(rid,slot);
    const m=getMatchDef(rid,slot);if(!m)return null;
    const tA=qResolveTeam(m.srcA||m.fromA);const tB=qResolveTeam(m.srcB||m.fromB);
    if(!w||!tA||!tB)return null;
    return w===tA?tB:tA;
  }
  const lu=src.lastIndexOf('_');if(lu<0)return null;
  const rid=src.slice(0,lu);const slot=parseInt(src.slice(lu+1));
  return getKnockoutWinner(rid,slot);
}
function getKnockoutWinner(rid,slot){
  const ks=getKScore(rid,slot);if(ks.h===''||ks.a==='')return null;
  const h=parseInt(ks.h),a=parseInt(ks.a);
  if(h===a)return ks.pen||null;
  const m=getMatchDef(rid,slot);if(!m)return null;
  const tA=qResolveTeam(m.srcA||m.fromA);const tB=qResolveTeam(m.srcB||m.fromB);
  return h>a?tA:tB;
}

function updateBracketMatch(rid,slot){
  const key=rid+'_'+slot;
  const m=getMatchDef(rid,slot);if(!m)return;
  const tA=qResolveTeam(m.srcA||m.fromA);const tB=qResolveTeam(m.srcB||m.fromB);
  const ks=getKScore(rid,slot);const winner=getKnockoutWinner(rid,slot);
  const isDraw=ks.h!==''&&ks.a!==''&&parseInt(ks.h)===parseInt(ks.a);
  const g=n=>document.getElementById(n);
  if(g('bna-'+key))g('bna-'+key).textContent=tA||'Por definir';
  if(g('bnb-'+key))g('bnb-'+key).textContent=tB||'Por definir';
  if(g('bfa-'+key))g('bfa-'+key).textContent=tA?FLAGS[tA]||'🏳️':'🏳️';
  if(g('bfb-'+key))g('bfb-'+key).textContent=tB?FLAGS[tB]||'🏳️':'🏳️';
  if(g('bta-'+key))g('bta-'+key).className='b-team'+(tA?'':' tbd')+(winner&&winner===tA?' winner':'');
  if(g('btb-'+key))g('btb-'+key).className='b-team'+(tB?'':' tbd')+(winner&&winner===tB?' winner':'');
  const sh=g('bsh-'+key);const sa=g('bsa-'+key);
  if(sh)sh.disabled=!tA||!tB;if(sa)sa.disabled=!tA||!tB;
  const pe=g('bpen-'+key);
  if(pe){
    pe.style.display=isDraw&&tA&&tB?'flex':'none';
    if(isDraw&&tA&&tB)pe.innerHTML=
      '<span style="font-size:11px;color:var(--muted)">Penaltis:</span>'+
      '<button class="pen-btn'+(ks.pen===tA?' active':'')+'" onclick="qSetPen(\''+rid+'\','+slot+',\''+escQ(tA)+'\')">'+FLAGS[tA]+' '+tA+'</button>'+
      '<button class="pen-btn'+(ks.pen===tB?' active':'')+'" onclick="qSetPen(\''+rid+'\','+slot+',\''+escQ(tB)+'\')">'+FLAGS[tB]+' '+tB+'</button>';
  }
  updateQChampion();
}
function cascadeBracketUpdate(rid,slot){
  const key=rid+'_'+slot;
  BRACKET.forEach(function(rd){
    rd.matches.forEach(function(m){
      const a=m.fromA||'';const b=m.fromB||'';
      if(a===key||b===key||a===key+'_loser'||b===key+'_loser'){
        updateBracketMatch(rd.id,m.slot);cascadeBracketUpdate(rd.id,m.slot);
      }
    });
  });
}

}

let statsCache={},statsLoaded=false;
const STATS_KEY='mw26_stats';
async function loadGoleadores(){
  const el=document.getElementById('golesContent');
  // Load from cache
  try{const c=storageGet(STATS_KEY,'');if(c)statsCache=JSON.parse(c);}catch{}
  // Get list of finished matches
  const today=new Date().toISOString().slice(0,10);
  const finishedFx=FIXTURES.filter(f=>f.date<today&&f.home!=='TBD');
  if(finishedFx.length===0){
    renderStats(el);
    return;
  }
  // Build stats from cache
  renderStats(el);
  // Load missing matches
  const missing=finishedFx.filter(f=>{const k=`${f.home}|${f.away}`;return!statsCache[k];});
  if(missing.length>0){
    el.innerHTML+=`<div id="statsProgress" style="font-size:12px;color:var(--muted);text-align:center;margin-top:14px">${t('statsProgress',{done:0,total:missing.length})}</div>`;
    await fetchMissingStats(missing,el);
  }
}
async function fetchMissingStats(missing,el){
  let done=0;
  const delay=ms=>new Promise(r=>setTimeout(r,ms));
  for(const f of missing){
    try{
      // Find event ID from API results
      const k=`${f.home}|${f.away}`;
      let eid=apiResults[k]?.id;
      if(!eid){
        // Search for event
        const d=await v1(`/searchevents.php?e=${encodeURIComponent(f.home+'_vs_'+f.away)}&s=2026`);
        const evs=d.events||[];
        if(evs[0])eid=evs[0].idEvent;
      }
      if(eid){
        const tl=await v1(`/lookuptimeline.php?id=${eid}`);
        statsCache[k]={timeline:tl.timeline||[],eid};
        storageSet(STATS_KEY,JSON.stringify(statsCache));
      }
      done++;
      const p=document.getElementById('statsProgress');
      if(p)p.textContent=t('statsProgress',{done,total:missing.length});
      if(done%5===0)renderStats(el,true);
      await delay(700); // respect rate limit
    }catch(e){done++;await delay(500);}
  }
  renderStats(el);
  const p=document.getElementById('statsProgress');
  if(p)p.remove();
}
function renderStats(el,append){
  const scorers={},assists={},keepers={};
  Object.entries(statsCache).forEach(function([k,obj]){
    const timeline=obj.timeline||[];
    if(!timeline.length)return;
    const parts=k.split('|');const home=parts[0];const away=parts[1];
    let hGoals=0,aGoals=0;
    timeline.forEach(function(ev){
      const type=ev.strTimelineType||'';
      if(type==='Goal'||type==='Penalty'){
        const p=ev.strPlayer;if(!p)return;
        if(!scorers[p])scorers[p]={name:p,team:ev.strTeam||'',goals:0,ast:0};
        scorers[p].goals++;
        const ap=ev.strAssistPlayer||ev.strAssist;
        if(ap){
          if(!assists[ap])assists[ap]={name:ap,team:ev.strTeam||'',ast:0};
          assists[ap].ast++;
        }
        if((ev.strTeam||'')===(home||''))hGoals++;else aGoals++;
      }
    });
    if(hGoals===0){if(!keepers[home])keepers[home]={name:home,cs:0};keepers[home].cs++;}
    if(aGoals===0){if(!keepers[away])keepers[away]={name:away,cs:0};keepers[away].cs++;}
  });
  const topScorers=Object.values(scorers).sort(function(a,b){return b.goals-a.goals;}).slice(0,15);
  const topAssists=Object.values(assists).sort(function(a,b){return b.ast-a.ast;}).slice(0,10);
  const topKeepers=Object.values(keepers).sort(function(a,b){return b.cs-a.cs;}).slice(0,10);
  function renderPlayerRows(list,kind){
    if(!list.length){
      const emptyKey=kind==='goals'?'noScorers':kind==='assists'?'noAssists':'noKeepers';
      return '<div class="stat-empty-row">'+t(emptyKey)+'<br>'+t('statsAvailableSoon')+'</div>';
    }
    return list.map(function(p,i){
      const val=kind==='goals'?p.goals:kind==='assists'?p.ast:p.cs;
      const team=kind==='keepers'?p.name:p.team;
      const label=kind==='goals'?t('goals'):kind==='assists'?t('assistCount'):t('cleanSheetCount');
      return '<div class="stat-row">'+
        '<span class="stat-pos">'+(i+1)+'</span>'+
        '<span class="stat-flag">'+(FLAGS[team]||'🏳️')+'</span>'+
        '<div class="stat-info"><div class="stat-pname">'+p.name+'</div><div class="stat-team">'+(kind==='keepers'?val+' '+label:team)+'</div></div>'+
        '<span class="stat-val">'+val+'</span></div>';
    }).join('');
  }
  let html='<div class="stats-intro">'+
    '<div class="info-box" style="flex:1;min-width:240px;margin-bottom:0">'+t('statsIntro')+'</div>'+
    '<div class="stat-pills">'+
      '<span class="stat-pill '+(topScorers.length?'ready':'')+'">⚽ '+t('scorers')+'</span>'+
      '<span class="stat-pill '+(topAssists.length?'ready':'')+'">🎯 '+t('assists')+'</span>'+
      '<span class="stat-pill '+(topKeepers.length?'ready':'')+'">🥅 '+t('keepers')+'</span>'+
    '</div></div>';
  html+='<div class="stat-card"><div class="stat-card-hdr">⚽ '+t('scorers')+'</div>'+renderPlayerRows(topScorers,'goals')+'</div>';
  html+='<div class="stat-card"><div class="stat-card-hdr">🎯 '+t('assists')+'</div>'+renderPlayerRows(topAssists,'assists')+'</div>';
  html+='<div class="stat-card"><div class="stat-card-hdr">🥅 '+t('keepers')+' · '+t('cleanSheets')+'</div>'+renderPlayerRows(topKeepers,'keepers')+'</div>';
  html+='<div style="text-align:center;margin-top:14px">'+
    '<button class="btn btn-sm" onclick="refreshStats()">↻ '+t('refreshStats')+'</button></div>';
  if(append){var old=el.querySelector('.stat-card,.empty');if(old){el.innerHTML=html;return;}}
  el.innerHTML=html;
}
function refreshStats(){statsCache={};storageRemove(STATS_KEY);loadGoleadores();}

async function showTeamSquad(team,name,el,back){
  const badgeHtml=team.strBadge?

    '<span style="font-size:46px">'+(FLAGS[name]||'🏳️')+'</span>';
  const profile='<div style="display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px">'+
    badgeHtml+'<div>'+
    '<div style="font-family:var(--disp);font-size:20px;letter-spacing:1px">'+(team.strTeam||name)+'</div>'+
    (team.strCountry?'<div style="font-size:12px;color:var(--muted);margin-top:3px">'+team.strCountry+'</div>':'')+
    (team.strDescriptionEN?'<div style="font-size:11px;color:var(--muted);margin-top:4px;max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+team.strDescriptionEN.slice(0,80)+'...</div>':'')+
    '</div></div>';
  el.innerHTML=back+profile+'<div class="loading"><div class="spinner"></div><span class="loading-text">'+t('squadLoading')+'</span></div>';
  try{
    const d=await v1('/lookup_all_players.php?id='+team.idTeam);
    const players=d.player||[];
    if(!players.length){
      // No players in DB — show FIFA link
      el.innerHTML=back+profile+
        '<div class="empty"><div class="empty-icon">👤</div>'+
        '<div class="empty-text">'+t('noSquad',{team:name})+'<br><br>'+
        '<a href="https://www.fifa.com/en/tournament/2026/teams" target="_blank" rel="noopener" style="color:var(--gold)">'+t('officialSquad')+' →</a><br><br>'+
        '<a href="https://www.thesportsdb.com/team/'+team.idTeam+'" target="_blank" rel="noopener" style="color:var(--muted);font-size:11px">'+t('viewTsdb')+'</a>'+
        '</div></div>';
      return;
    }
    function squadRole(p){
      const pos=(p.strPosition||'').toLowerCase();
      if(pos.includes('manager')||pos.includes('coach'))return 'manager';
      if(pos.includes('goal')||pos.includes('keeper'))return 'goalkeepers';
      if(pos.includes('def')||pos.includes('back'))return 'defenders';
      if(pos.includes('mid'))return 'midfielders';
      if(pos.includes('forward')||pos.includes('striker')||pos.includes('wing')||pos.includes('attack'))return 'forwards';
      return 'midfielders';
    }
    const blocks=[
      {key:'goalkeepers',label:t('goalkeepers')},
      {key:'defenders',label:t('defenders')},
      {key:'midfielders',label:t('midfielders')},
      {key:'forwards',label:t('forwards')}
    ];
    const byRole={goalkeepers:[],defenders:[],midfielders:[],forwards:[]};
    let managerPlayer=null;
    players.forEach(function(p){
      const role=squadRole(p);
      if(role==='manager'){managerPlayer=managerPlayer||p;return;}
      byRole[role].push(p);
    });
    const managerName=(managerPlayer&&managerPlayer.strPlayer)||team.strManager||team.strCoach||team.strHeadCoach||team.strManagerName||'';
    const managerMeta=(managerPlayer&&(managerPlayer.strTeam||managerPlayer.strPosition))||'';
    function playerCard(p){
      var born=p.dateBorn?p.dateBorn.slice(0,4):'';
      var age=born?(new Date().getFullYear()-parseInt(born))+' '+t('years'):'';
      var club=p.strTeam||'';
      return '<div class="pc">'+
        '<div class="pc-pos">'+(p.strPosition||'—')+'</div>'+
        '<div class="pc-name">'+p.strPlayer+'</div>'+
        (p.strNumber?'<div class="pc-num">#'+p.strNumber+'</div>':'')+
        (age?'<div class="pc-num">'+age+(club?' · '+club:'')+'</div>':
             (club?'<div class="pc-num">'+club+'</div>':''))+
        '</div>';
    }
    let ph='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'+
      '<div class="sec-ttl">'+t('squad')+' ('+players.length+')</div>'+
      '<a href="https://www.fifa.com/en/tournament/2026/teams" target="_blank" rel="noopener" style="font-size:11px;color:var(--gold)">FIFA.com →</a></div>';
    ph+='<div class="squad-blocks">';
    blocks.forEach(function(block){
      const list=byRole[block.key];
      ph+='<section class="squad-block"><div class="squad-hdr"><span class="squad-title">'+block.label+'</span><span class="squad-count">'+list.length+'</span></div>';
      if(list.length)ph+='<div class="squad-grid">'+list.map(playerCard).join('')+'</div>';
      else ph+='<div class="stat-empty-row">'+t('noPlayersInBlock')+'</div>';
      ph+='</section>';
    });
    ph+='<section class="squad-block full"><div class="squad-hdr"><span class="squad-title">'+t('manager')+'</span><span class="squad-count">'+(managerName?'1':'0')+'</span></div>';
    if(managerName){
      ph+='<div class="manager-card"><div class="manager-avatar">M</div><div class="stat-info"><div class="stat-pname">'+managerName+'</div><div class="stat-team">'+(managerMeta||t('manager'))+'</div></div></div>';
    }else{
      ph+='<div class="stat-empty-row">'+t('managerMissing')+'</div>';
    }
    ph+='</section></div>';
    el.innerHTML=back+profile+ph;
  }catch(e){
    el.innerHTML=back+profile+'<div class="empty"><div class="empty-icon">⚠️</div>'+
      '<div class="empty-text">'+t('playersLoadError')+': '+e.message+'<br><br>'+
      '<a href="https://www.fifa.com/en/tournament/2026/teams" target="_blank" rel="noopener" style="color:var(--gold)">'+t('officialSquad')+' →</a></div></div>';
  }
}

// DETAIL PANEL
async function openDetail(eid,date,home,away){
  const panel=document.getElementById('detailPanel');
  const inner=document.getElementById('detailInner');
  const close=document.getElementById('dClose');
  panel.classList.add('open');close.style.display='flex';
  document.body.style.overflow='hidden';
  inner.innerHTML='<div class="loading" style="min-height:200px"><div class="spinner"></div><span class="loading-text">Cargando detalles...</span></div>';
  let eventId=eid;
  if(!eventId||eventId===0){
    try{
      const k=`${home}|${away}`;
      eventId=apiResults[k]&&apiResults[k].id;
      if(!eventId){const d=await v1(`/searchevents.php?e=${encodeURIComponent(home+'_vs_'+away)}`);eventId=d.events&&d.events[0]&&d.events[0].idEvent;}
    }catch{}
  }
  if(!eventId){
    const fx=FIXTURES.find(f=>f.home===home&&f.away===away&&f.date===date);
    if(fx){
      const es=toES(fx.date,fx.time);
      inner.innerHTML=`<div style="padding:20px;text-align:center">
        <div style="font-family:var(--disp);font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:10px">${fx.group}</div>
        <div style="display:flex;justify-content:center;gap:20px;align-items:center;margin:12px 0">
          <div style="text-align:center"><span style="font-size:36px">${fx.homeFlag}</span><div style="font-family:var(--disp);font-size:14px;margin-top:5px">${fx.home}</div></div>
          <div style="font-family:var(--mono);font-size:16px;color:var(--muted)">VS</div>
          <div style="text-align:center"><span style="font-size:36px">${fx.awayFlag}</span><div style="font-family:var(--disp);font-size:14px;margin-top:5px">${fx.away}</div></div>
        </div>
        ${es?`<div style="background:rgba(201,162,39,.06);border:1px solid var(--border);border-radius:8px;padding:9px 14px;display:inline-flex;align-items:center;gap:8px;margin-top:6px">
          <span style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--gold)">${es.time}</span>
          <span style="font-size:9px;color:var(--gold2);text-transform:uppercase;letter-spacing:1px">🇪🇸 hora España</span>
          <span style="font-family:var(--mono);font-size:10px;color:var(--muted)">${fx.time} UTC</span>
        </div>`:''}
        <div style="font-size:11px;color:var(--muted);margin-top:8px">📍 ${fx.venue}, ${fx.city}</div>
      </div>`;
    }else inner.innerHTML='<div class="empty" style="padding:40px"><div class="empty-icon">📅</div><div class="empty-text">Partido no encontrado</div></div>';
    return;
  }
  try{
    const[evD,tlD,stD,hlD,luD]=await Promise.allSettled([
      v1(`/lookupevent.php?id=${eventId}`),
      v1(`/lookuptimeline.php?id=${eventId}`),
      v1(`/lookupeventstats.php?id=${eventId}`),
      v2(`/lookup/event_highlights/${eventId}`),
      v1(`/lookuplineup.php?id=${eventId}`)
    ]);
    const ev=(evD.value&&evD.value.events&&evD.value.events[0]);
    if(!ev){inner.innerHTML='<div class="empty" style="padding:40px"><div class="empty-icon">❌</div><div class="empty-text">Sin datos API</div></div>';return;}
    const es=toES(ev.dateEvent,ev.strTime&&ev.strTime.slice(0,5));
    const fin=isFin(ev.strStatus),live2=isLive(ev.strStatus);
    const hasScore=ev.intHomeScore!==null&&ev.intHomeScore!==undefined;
    let html=`<div style="padding:16px">
      <div style="text-align:center;margin-bottom:12px">
        <div style="font-family:var(--disp);font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:7px">${ev.strRound||''}</div>
        <div style="display:flex;justify-content:center;gap:14px;align-items:center">
          <div style="text-align:center">
            ${ev.strHomeTeamBadge?`<img src="${ev.strHomeTeamBadge}/medium" style="width:42px;height:42px;object-fit:contain;display:block;margin:0 auto 4px">`:
            `<div style="font-size:32px;margin-bottom:4px">${FLAGS[ev.strHomeTeam]||'🏳️'}</div>`}
            <div style="font-family:var(--disp);font-size:12px">${ev.strHomeTeam}</div>
          </div>
          <div style="text-align:center;min-width:65px">
            ${(fin||live2)&&hasScore?`<div style="font-family:var(--mono);font-size:28px;font-weight:700;color:${live2?'var(--live)':'var(--text)'}">${ev.intHomeScore} – ${ev.intAwayScore}</div>`:
            `<div style="font-family:var(--mono);font-size:14px;color:var(--muted)">VS</div>`}
            ${live2?`<div style="font-size:10px;color:var(--live);font-weight:600">${ev.strProgress||'EN JUEGO'}'</div>`:''}
          </div>
          <div style="text-align:center">
            ${ev.strAwayTeamBadge?`<img src="${ev.strAwayTeamBadge}/medium" style="width:42px;height:42px;object-fit:contain;display:block;margin:0 auto 4px">`:
            `<div style="font-size:32px;margin-bottom:4px">${FLAGS[ev.strAwayTeam]||'🏳️'}</div>`}
            <div style="font-family:var(--disp);font-size:12px">${ev.strAwayTeam}</div>
          </div>
        </div>
        ${es?`<div style="background:rgba(201,162,39,.06);border:1px solid var(--border);border-radius:8px;padding:7px 12px;display:inline-flex;align-items:center;gap:8px;margin-top:8px">
          <span style="font-family:var(--mono);font-size:16px;font-weight:700;color:var(--gold)">${es.time}</span>
          <span style="font-size:9px;color:var(--gold2);text-transform:uppercase;letter-spacing:1px">🇪🇸 hora España</span>
          <span style="font-family:var(--mono);font-size:10px;color:var(--muted)">${ev.strTime&&ev.strTime.slice(0,5)||''} UTC</span>
        </div>`:''}
        ${ev.strVenue?`<div style="font-size:11px;color:var(--muted);margin-top:6px">📍 ${ev.strVenue}${ev.strCity?', '+ev.strCity:''}</div>`:''}
      </div>`;
    // Stats
    const stats=(stD.value&&stD.value.eventstats)||[];
    if(stats.length){
      html+=`<div style="margin-top:12px"><div class="sec-ttl" style="margin-bottom:8px">ESTADÍSTICAS</div>`;
      const sm={};stats.forEach(s=>{sm[s.strStat]=s;});
      ['Shots','Shots on Goal','Possession','Passes','Fouls','Yellow Cards','Red Cards','Corners'].forEach(k=>{
        const s=sm[k];if(!s)return;
        const h=parseFloat(s.intHome)||0,a=parseFloat(s.intAway)||0,tot=h+a;
        const hp=tot>0?h/tot*100:50;
        html+=`<div class="sbar-row"><div class="sbar-lbls">
          <span style="font-family:var(--mono)">${h}${k.includes('Poss')?'%':''}</span>
          <span class="sbar-lbl-mid">${k}</span>
          <span style="font-family:var(--mono)">${a}${k.includes('Poss')?'%':''}</span>
        </div><div class="sbar-track"><div class="sbar-h" style="width:${hp}%"></div><div class="sbar-a" style="width:${100-hp}%"></div></div></div>`;
      });
      html+='</div>';
    }
    // Timeline
    const tl=(tlD.value&&tlD.value.timeline)||[];
    if(tl.length){
      html+=`<div style="margin-top:12px"><div class="sec-ttl" style="margin-bottom:7px">TIMELINE</div>`;
      tl.forEach(e=>{
        const icon=e.strTimelineType==='Goal'?'⚽':e.strTimelineType==='Yellow Card'?'🟨':e.strTimelineType==='Red Card'?'🟥':e.strTimelineType==='Substitution'?'🔄':'•';
        html+=`<div class="tl-ev"><div class="tl-min">${e.strTimeline}'</div><div style="font-size:15px">${icon}</div>
          <div><div class="tl-txt">${e.strPlayer||e.strTimelineType}</div><div class="tl-team">${e.strTeam||''}</div></div></div>`;
      });
      html+='</div>';
    }
    // Highlights
    const hls=(hlD.value&&(hlD.value.highlights||hlD.value.results))||[];
    if(hls.length){
      html+=`<div style="margin-top:12px"><div class="sec-ttl" style="margin-bottom:7px">HIGHLIGHTS</div>`;
      hls.slice(0,3).forEach(h=>{
        html+=`<a class="hl-card" href="${h.strVideo||h.strYoutube||'#'}" target="_blank" rel="noopener">
          ${h.strThumb?`<img src="${h.strThumb}" style="width:70px;height:44px;object-fit:cover;border-radius:4px" alt="">`:
          `<div class="hl-play">▶</div>`}
          <div class="hl-title">${h.strFilename||h.strEvent||'Ver highlight'}</div></a>`;
      });
      html+='</div>';
    }
    // Lineups
    const lu=(luD.value&&luD.value.lineup)||[];
    if(lu.length){
      const hLu=lu.filter(p=>p.strTeam===ev.strHomeTeam);
      const aLu=lu.filter(p=>p.strTeam===ev.strAwayTeam);
      html+=`<div style="margin-top:12px"><div class="sec-ttl" style="margin-bottom:7px">ALINEACIONES</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">`;
      [[hLu,ev.strHomeTeam],[aLu,ev.strAwayTeam]].forEach(([lineup,tname])=>{
        html+=`<div><div style="font-family:var(--disp);font-size:11px;letter-spacing:1px;color:var(--gold);margin-bottom:5px">${tname}</div>`;
        lineup.forEach(p=>{html+=`<div style="font-size:10px;padding:3px 0;border-bottom:1px solid var(--border);display:flex;gap:6px">
          <span style="font-family:var(--mono);color:var(--muted);min-width:16px">${p.intSquadNumber||'—'}</span>
          <span>${p.strPlayer}</span></div>`;});
        html+='</div>';
      });
      html+='</div></div>';
    }
    html+='</div>';
    inner.innerHTML=html;
  }catch(e){inner.innerHTML=`<div class="empty" style="padding:40px"><div class="empty-icon">⚠️</div><div class="empty-text">${e.message}</div></div>`;}
}
function closeDetail(){
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('dClose').style.display='none';
  document.body.style.overflow='';
}
document.getElementById('detailPanel').addEventListener('click',e=>{if(e.target===document.getElementById('detailPanel'))closeDetail();});

// TAB SWITCHING
let activeTab='live',calLoaded=false,golesLoaded=false;
function switchTab(tab){
  clearInterval(liveTimer);
  activeTab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['live','cal','quiniela','goles','equipos'][i]===tab);
  });
  ['live','cal','quiniela','goles','equipos'].forEach(id=>{
    document.getElementById('tab-'+id).style.display=id===tab?'block':'none';
  });
  if(tab==='live')loadLive();
  if(tab==='cal'&&!calLoaded){loadCal();calLoaded=true;}
  if(tab==='cal'&&calLoaded)renderCal();
  if(tab==='quiniela')renderQGroups();
  if(tab==='goles'&&!golesLoaded){loadGoleadores();golesLoaded=true;}
  if(tab==='equipos')initEquipos();
}

// INIT
applyLang();
loadLive();
setTimeout(()=>{loadCal();calLoaded=true;},2000);
</script>
