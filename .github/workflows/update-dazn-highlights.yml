name: Update DAZN highlights

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: mundial-data-updates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update highlights JSON
        run: node scripts/update-dazn-highlights.mjs
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dazn-highlights.json
          if git diff --cached --quiet; then
            echo "No highlight changes"
          else
            git commit -m "Update DAZN highlights"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push
          fi
