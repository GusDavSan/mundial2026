name: Update lineups

on:
  workflow_dispatch:
  schedule:
    - cron: "22 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update lineups JSON
        run: node scripts/update-lineups.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/lineups.json
          if git diff --cached --quiet; then
            echo "No lineup changes"
          else
            git commit -m "Update lineups"
            git push
          fi
